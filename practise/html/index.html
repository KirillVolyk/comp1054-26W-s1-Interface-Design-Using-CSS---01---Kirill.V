<!DOCTYPE html>

</head>

<body>

        <div class="logo">My Brand</div>
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="content">
        <section class="hero">
            <h1>Deep Violet & Gold</h1>
