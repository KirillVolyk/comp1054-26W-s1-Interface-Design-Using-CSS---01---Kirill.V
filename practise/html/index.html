<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Palette Demo</title>
  <link href="../css/style.css" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="logo">My Brand</div>
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main class="content">
    <section class="hero">
      <h1>Deep Violet & Gold</h1>
      <p>
        This is a simple demo of your dark purple, maroon, and antique gold palette.
      </p>
      <button class="btn-primary">Primary Action</button>
      <button class="btn-secondary">Secondary</button>
    </section>

    <section class="cards">
      <article class="card">
        <h2>Card Title</h2>
        <p>Using the main purple as a surface color.</p>
      </article>
      <article class="card card-accent">
        <h2>Accent Card</h2>
        <p>Maroon accent with a gold border.</p>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 My Brand</p>
  </footer>
</body>
</html>
